services:
  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - 3000:3000
    restart: unless-stopped

  worker:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: npm run worker
    restart: unless-stopped